name: Release

# Triggered when a version tag is pushed: v1.2.3 or v1.2.3-rc.1
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # needed to create GitHub Release and push versions.json

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch all history so package.sh can use git archive
          fetch-depth: 0
          # Use GITHUB_TOKEN to allow push back of versions.json
          token: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------------
      # 1. Determine version metadata
      # ---------------------------------------------------------------
      - name: Extract version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"               # e.g. v0.2.0 or v0.2.0-rc.1
          VERSION="${TAG#v}"                      # strip leading 'v'

          # Pre-release detection
          if echo "$VERSION" | grep -qE '(pre|rc|alpha|beta)'; then
            PRERELEASE=true
            CHANNEL="rc"
          else
            PRERELEASE=false
            CHANNEL="stable"
          fi

          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "released=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # 2. Install rsync (used by package.sh --dirty flag)
      # ---------------------------------------------------------------
      - name: Install rsync
        run: sudo apt-get install -y rsync

      # ---------------------------------------------------------------
      # 3. Generate templatized tarballs
      # ---------------------------------------------------------------
      - name: Package sibling repos
        run: |
          # Set workspace root so package.sh can find sibling repos
          # In the release runner, sibling repos are NOT present — we skip
          # the tarball generation and create placeholder info instead.
          #
          # If you want real tarballs in the release, run package.sh locally
          # and commit the output as a build step that downloads them, OR
          # use a monorepo approach where all repos are submodules.
          #
          # For now we package the installer itself as the main release asset.
          tar -czf softwarefactory-${{ steps.meta.outputs.version }}.tar.gz \
            --exclude='.git' \
            --exclude='installer/templates' \
            --exclude='installer/_old_cli_backup' \
            --exclude='installer/manifests' \
            --exclude='installer/modes' \
            --exclude='installer/scripts' \
            --exclude='*.log' \
            .

      # ---------------------------------------------------------------
      # 4. Generate checksum
      # ---------------------------------------------------------------
      - name: Generate SHA-256 checksums
        run: |
          sha256sum softwarefactory-${{ steps.meta.outputs.version }}.tar.gz \
            > checksums.sha256
          cat checksums.sha256

      # ---------------------------------------------------------------
      # 5. Create GitHub Release with assets
      # ---------------------------------------------------------------
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "Software Factory ${{ steps.meta.outputs.tag }}"
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            git clone https://github.com/AndresBardales/softwarefactory.git --branch ${{ steps.meta.outputs.tag }}
            cd softwarefactory
            bash install.sh
            ```

            Or download the installer archive below and run:
            ```bash
            tar -xzf softwarefactory-${{ steps.meta.outputs.version }}.tar.gz
            cd softwarefactory
            bash install.sh
            ```

            ## Upgrade existing install

            ```bash
            sf upgrade
            ```

            ## What's New

            See the auto-generated release notes below.

            ## Checksums (SHA-256)

            ```
            $(cat checksums.sha256)
            ```
          files: |
            softwarefactory-${{ steps.meta.outputs.version }}.tar.gz
            checksums.sha256

      # ---------------------------------------------------------------
      # 6. Update versions.json in main branch
      # ---------------------------------------------------------------
      - name: Update versions.json
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TAG="${{ steps.meta.outputs.tag }}"
          CHANNEL="${{ steps.meta.outputs.channel }}"
          RELEASED="${{ steps.meta.outputs.released }}"
          REPO="https://github.com/AndresBardales/softwarefactory"

          # Rebuild versions.json
          python3 - <<'PYEOF'
import json, os

v = os.environ.get('VERSION', '')
tag = os.environ.get('TAG', '')
channel = os.environ.get('CHANNEL', 'stable')
released = os.environ.get('RELEASED', '')
repo = os.environ.get('REPO', '')

try:
    with open('versions.json') as f:
        data = json.load(f)
except Exception:
    data = {"channels": {}, "history": []}

data["latest"] = {
    "channel": channel,
    "version": v,
    "tag": tag,
    "released": released,
    "installer_url": f"{repo}/archive/refs/tags/{tag}.tar.gz",
    "checksum_url": f"{repo}/releases/download/{tag}/checksums.sha256",
    "changelog": f"{repo}/releases/tag/{tag}",
    "minimum_required": "0.1.0"
}

data["channels"][channel] = v

# Keep history (last 20)
history = data.get("history", [])
history.insert(0, {"version": v, "tag": tag, "channel": channel, "released": released})
data["history"] = history[:20]

with open('versions.json', 'w') as f:
    json.dump(data, f, indent=2)
    f.write('\n')

print(f"versions.json updated: {v} ({channel})")
PYEOF
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ steps.meta.outputs.tag }}
          CHANNEL: ${{ steps.meta.outputs.channel }}
          RELEASED: ${{ steps.meta.outputs.released }}
          REPO: https://github.com/AndresBardales/softwarefactory

      - name: Commit updated versions.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Commit to main branch (not tag)
          git fetch origin main
          git checkout main
          git add versions.json
          git diff --staged --quiet && echo "No changes to versions.json" && exit 0
          git commit -m "chore: update versions.json → ${{ steps.meta.outputs.tag }}"
          git push origin main
