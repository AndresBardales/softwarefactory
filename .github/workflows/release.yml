# ==============================================================================
# Software Factory — Release Pipeline
# ==============================================================================
# Triggers on version tags (v*.*.*) and creates a GitHub Release with:
#   - Release notes from conventional commits
#   - Installer bundle (softwarefactory-vX.Y.Z.tar.gz)
#   - SHA256 checksum file
#
# Manual trigger also supported for pre-release builds.
# ==============================================================================

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'   # v1.0.0, v1.0.0-rc.1, etc.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0-rc.1)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for changelog generation

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

          # Detect pre-release (contains hyphen: v1.0.0-rc.1)
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stamp version in sf CLI
        run: |
          sed -i "s/SF_VERSION:-1.0.0/SF_VERSION:-${{ steps.version.outputs.version }}/" installer/sf

      - name: Build installer bundle
        run: |
          BUNDLE_NAME="softwarefactory-${{ steps.version.outputs.tag }}"

          # Create a clean archive of the installer (no .git, no dev files)
          mkdir -p dist
          tar -czf "dist/${BUNDLE_NAME}.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='*.log' \
            --exclude='.env' \
            --transform "s,^,softwarefactory/," \
            install.sh package.sh README.md LICENSE CONTRIBUTING.md GUIDE.md \
            installer/

          # Generate checksum
          cd dist
          sha256sum "${BUNDLE_NAME}.tar.gz" > "${BUNDLE_NAME}.sha256"

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -2 | tail -1)
          CURRENT_TAG="${{ steps.version.outputs.tag }}"

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md

          # Group commits by type
          for type_label in "feat:Features" "fix:Bug Fixes" "docs:Documentation" "refactor:Refactoring" "chore:Maintenance"; do
            TYPE="${type_label%%:*}"
            LABEL="${type_label##*:}"
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --grep="^${TYPE}" 2>/dev/null || true)
            if [ -n "$COMMITS" ]; then
              echo "### ${LABEL}" >> changelog.md
              echo "$COMMITS" >> changelog.md
              echo "" >> changelog.md
            fi
          done

          # Catch-all for non-conventional commits
          OTHER=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --invert-grep --grep="^feat\|^fix\|^docs\|^refactor\|^chore" 2>/dev/null || true)
          if [ -n "$OTHER" ]; then
            echo "### Other Changes" >> changelog.md
            echo "$OTHER" >> changelog.md
            echo "" >> changelog.md
          fi

          echo "---" >> changelog.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ steps.version.outputs.tag }}" >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Software Factory ${{ steps.version.outputs.tag }}
          body_path: changelog.md
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: |
            dist/softwarefactory-${{ steps.version.outputs.tag }}.tar.gz
            dist/softwarefactory-${{ steps.version.outputs.tag }}.sha256

      - name: Update versions.json (stable releases only)
        if: steps.version.outputs.prerelease == 'false'
        run: |
          # Update the versions manifest for sf upgrade
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          CHECKSUM=$(cat dist/softwarefactory-${TAG}.sha256 | awk '{print $1}')
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/softwarefactory-${TAG}.tar.gz"

          cat > versions.json <<EOF
          {
            "latest": "${VERSION}",
            "channels": {
              "stable": "${VERSION}"
            },
            "releases": {
              "${VERSION}": {
                "tag": "${TAG}",
                "date": "${DATE}",
                "download": "${DOWNLOAD_URL}",
                "sha256": "${CHECKSUM}",
                "min_upgrade_from": "0.1.0",
                "changelog": "https://github.com/${{ github.repository }}/releases/tag/${TAG}"
              }
            }
          }
          EOF

          # Commit the updated versions.json back to main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add versions.json
          git commit -m "chore: update versions.json for ${TAG}" || true
          git push origin main || true
